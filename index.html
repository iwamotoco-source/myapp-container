<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- アプリ化 (PWA) 用メタタグ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="App倉庫">
    <meta name="theme-color" content="#000000">
    <title>WEBアプリ倉庫</title>
    <style>
        /* 基本リセットとテーマ設定 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #6c63ff; 
            --accent-active: #5a52d5;
            --danger: #ff4d6d;
            --success: #4ade80; 
            --warn: #facc15;
            --radius: 14px; 
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        [data-theme="dark"] {
            --bg: #0f1117; 
            --surface: #1a1d27; 
            --surface2: #22263a;
            --border: rgba(255,255,255,0.07); 
            --text: #e8eaf6; 
            --muted: #8b92b8;
            --modal-bg-overlay: rgba(0,0,0,0.72); 
            --input-bg: #22263a;
        }

        body {
            background: var(--bg); 
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
            min-height: 100vh; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* モーダルのオーバーレイ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-bg-overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9998;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }

        /* モーダル本体：スクロール動作の要となる構造 */
        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            max-height: 85dvh; /* 画面高の85%に制限 */
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column; /* 縦方向のフレックスボックス */
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 9999;
        }
        .modal-overlay.active .modal {
            transform: scale(1);
            opacity: 1;
        }

        /* モーダルの各領域 */
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* 縮小させない */
        }
        .modal-header h2 {
            font-size: 1.2rem;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* スクロール領域 */
        .modal-body {
            padding: 20px;
            overflow-y: auto; /* 縦スクロールを許可 */
            flex-grow: 1; /* 残りの空間をすべて埋める */
            -webkit-overflow-scrolling: touch; /* iOSでの滑らかなスクロール */
        }

        /* モーダルフッター（保存ボタン領域） */
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0; /* 縮小させない */
        }

        /* タブとフォームのスタイル */
        .type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
        }
        .type-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 16px; /* iOSのズーム防止 */
        }
        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary:active {
            background: var(--accent-active);
        }

        /* 表示切り替え用ユーティリティ */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- アプリ追加/編集モーダル -->
    <div class="modal-overlay active" id="appModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>アプリを登録</h2>
                <button type="button" class="close-btn" onclick="closeModal(); event.preventDefault();">×</button>
            </div>
            
            <div class="modal-body">
                <div class="type-selector">
                    <button type="button" class="type-btn active" data-type="html" onclick="selectType('html')">📄 HTML</button>
                    <button type="button" class="type-btn" data-type="url" onclick="selectType('url')">🔗 URL</button>
                    <button type="button" class="type-btn" data-type="bm" onclick="selectType('bm')">🔖 ブックマークレット</button>
                </div>

                <div class="form-group">
                    <label>アプリ名 *</label>
                    <input type="text" id="appName" placeholder="例: 配管占有率計算機">
                </div>

                <div class="form-group">
                    <label>アイコン（絵文字）</label>
                    <input type="text" id="appIcon" placeholder="📦" maxlength="2">
                </div>

                <div class="form-group" id="fieldHtml">
                    <label>HTMLコード *</label>
                    <textarea id="appHtml" placeholder="<!DOCTYPE html>..."></textarea>
                </div>

                <div class="form-group hidden" id="fieldUrl">
                    <label>URL *</label>
                    <input type="url" id="appUrl" placeholder="https://...">
                </div>

                <div class="form-group hidden" id="fieldBm">
                    <label>ブックマークレットコード *</label>
                    <textarea id="appBm" placeholder="javascript:..."></textarea>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-primary" onclick="saveApp()">保存する</button>
            </div>
        </div>
    </div>

    <script>
        // モーダルを閉じる処理
        function closeModal() {
            document.getElementById('appModalOverlay').classList.remove('active');
        }

        // タブ切り替え処理（UIの色変更と入力フィールドの切り替え）
        function selectType(type) {
            // すべてのボタンからactiveクラスを削除
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // クリックされたボタンにactiveクラスを付与（青色にする）
            document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');

            // すべての入力フィールドを隠す
            document.getElementById('fieldHtml').classList.add('hidden');
            document.getElementById('fieldUrl').classList.add('hidden');
            document.getElementById('fieldBm').classList.add('hidden');

            // 選択されたタイプのフィールドだけを表示
            if (type === 'html') {
                document.getElementById('fieldHtml').classList.remove('hidden');
            } else if (type === 'url') {
                document.getElementById('fieldUrl').classList.remove('hidden');
            } else if (type === 'bm') {
                document.getElementById('fieldBm').classList.remove('hidden');
            }
        }

        // 保存処理のプレースホルダー
        function saveApp() {
            alert('保存処理を実行します');
            closeModal();
        }
    </script>
</body>
</html>
